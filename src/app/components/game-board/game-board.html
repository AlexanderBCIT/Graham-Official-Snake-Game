<div #boardWrap class="board-wrap">
  <canvas #boardCanvas width="400" height="400"
          (touchstart)="onTouchStart($event)"
          (touchend)="onTouchEnd($event)"></canvas>
  <div class="scanlines"></div>

  @if (!engine.started() && engine.alive()) {
    <div class="start-hint pixel">PRESS A DIRECTION<br />TO START</div>
  }
</div>

<div class="controls-hint">arrow keys / WASD to move &nbsp;•&nbsp; space to pause</div>

<div class="dpad">
  <button class="up" (click)="onDpad('up')" (touchstart)="onDpadTouch('up', $event)">▲</button>
  <button class="left" (click)="onDpad('left')" (touchstart)="onDpadTouch('left', $event)">◀</button>
  <button class="pause" (click)="onPauseClick()">II</button>
  <button class="right" (click)="onDpad('right')" (touchstart)="onDpadTouch('right', $event)">▶</button>
  <button class="down" (click)="onDpad('down')" (touchstart)="onDpadTouch('down', $event)">▼</button>
</div>
